    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
        height: 100vh;
        height: 100dvh;
        background: #000;
        padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        position: relative;
    }

    .frame-container {
        display: flex;
        flex: 1;
        transition: all 0.3s ease;
    }

    .frame-container.vertical {
        flex-direction: column;
    }

    .frame-container.horizontal {
        flex-direction: row;
    }

    .frame {
        flex: 1;
        border: none;
        background: #fff;
        transition: all 0.3s ease;
    }

    .frame.hidden {
        flex: 0;
        opacity: 0;
        pointer-events: none;
    }

    .frame.full {
        flex: 1;
    }

    .menu-button {
        position: fixed;
        top: env(safe-area-inset-top, 10px);
        right: env(safe-area-inset-right, 10px);
        z-index: 1000;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        border: none;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    .menu-button:hover {
        background: rgba(0, 0, 0, 0.9);
    }

    .menu {
        position: fixed;
        top: calc(env(safe-area-inset-top, 10px) + 54px);
        right: env(safe-area-inset-right, 10px);
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 12px;
        padding: 20px;
        min-width: 280px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.3s ease;
    }

    .menu.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .menu-section {
        margin-bottom: 20px;
    }

    .menu-section:last-child {
        margin-bottom: 0;
    }

    .menu-section h3 {
        font-size: 14px;
        color: #666;
        margin-bottom: 10px;
        text-transform: uppercase;
        font-weight: 600;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .input-row {
        display: flex;
        gap: 10px;
    }

    .menu input {
        flex: 1;
        padding: 10px 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }

    .menu input:focus {
        border-color: #007AFF;
    }

    .load-btn {
        padding: 10px 16px;
        background: #007AFF;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.3s;
        white-space: nowrap;
    }

    .load-btn:hover {
        background: #0056CC;
    }

    .control-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .control-btn {
        padding: 12px;
        background: #f5f5f5;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        text-align: center;
        transition: background 0.3s;
    }

    .control-btn:hover {
        background: #e0e0e0;
    }

    .control-btn.active {
        background: #007AFF;
        color: white;
    }

    .layout-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
    }

    .layout-btn {
        padding: 10px;
        background: #f5f5f5;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        transition: background 0.3s;
    }

    .layout-btn:hover {
        background: #e0e0e0;
    }

    .layout-btn.active {
        background: #007AFF;
        color: white;
    }

    @media (max-width: 768px) {
        .menu {
            right: env(safe-area-inset-right, 5px);
            left: env(safe-area-inset-left, 5px);
            width: auto;
            min-width: auto;
        }
        
        .menu-button {
            top: calc(env(safe-area-inset-top, 0px) + 10px);
            right: calc(env(safe-area-inset-right, 0px) + 10px);
        }
    }

    /* iOS Safari specific */
    @supports (-webkit-touch-callout: none) {
        body {
            height: -webkit-fill-available;
        }
        
        .container {
            height: -webkit-fill-available;
        }
    }
</style>

    <div class="menu" id="menu">
        <div class="menu-section">
            <h3>Layout</h3>
            <div class="layout-buttons">
                <button class="layout-btn active" onclick="setLayout('vertical')">Dọc (Trên/Dưới)</button>
                <button class="layout-btn" onclick="setLayout('horizontal')">Ngang (Trái/Phải)</button>
            </div>
        </div>

        <div class="menu-section">
            <h3>Frame 1</h3>
            <div class="input-group">
                <div class="input-row">
                    <input type="url" id="url1" placeholder="Nhập link cho Frame 1..." value="https://www.google.com">
                    <button class="load-btn" onclick="loadFrame(1)">Tải</button>
                </div>
            </div>
        </div>

        <div class="menu-section">
            <h3>Frame 2</h3>
            <div class="input-group">
                <div class="input-row">
                    <input type="url" id="url2" placeholder="Nhập link cho Frame 2..." value="https://www.youtube.com">
                    <button class="load-btn" onclick="loadFrame(2)">Tải</button>
                </div>
            </div>
        </div>

        <div class="menu-section">
            <h3>Điều khiển</h3>
            <div class="control-buttons">
                <button class="control-btn active" onclick="showBothFrames()">Hiện cả 2</button>
                <button class="control-btn" onclick="showFrame(1)">Chỉ Frame 1</button>
                <button class="control-btn" onclick="showFrame(2)">Chỉ Frame 2</button>
                <button class="control-btn" onclick="reloadFrames()">Reload All</button>
            </div>
        </div>
    </div>

    <div class="frame-container vertical" id="frameContainer">
        <iframe class="frame" id="frame1" src="https://www.google.com"></iframe>
        <iframe class="frame" id="frame2" src="https://www.youtube.com"></iframe>
    </div>
</div>

<script>
    let currentLayout = 'vertical';
    let currentView = 'both';

    function toggleMenu() {
        const menu = document.getElementById('menu');
        menu.classList.toggle('show');
    }

    function setLayout(layout) {
        const container = document.getElementById('frameContainer');
        const buttons = document.querySelectorAll('.layout-btn');
        
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        container.className = `frame-container ${layout}`;
        currentLayout = layout;
    }

    function loadFrame(frameNum) {
        const url = document.getElementById(`url${frameNum}`).value;
        const frame = document.getElementById(`frame${frameNum}`);
        
        if (url) {
            // Thêm https:// nếu không có protocol
            let finalUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalUrl = 'https://' + url;
            }
            frame.src = finalUrl;
        }
    }

    function showBothFrames() {
        const frame1 = document.getElementById('frame1');
        const frame2 = document.getElementById('frame2');
        const buttons = document.querySelectorAll('.control-btn');
        
        buttons.forEach(btn => btn.classList.remove('active'));
        buttons[0].classList.add('active');
        
        frame1.classList.remove('hidden', 'full');
        frame2.classList.remove('hidden', 'full');
        currentView = 'both';
    }

    function showFrame(frameNum) {
        const frame1 = document.getElementById('frame1');
        const frame2 = document.getElementById('frame2');
        const buttons = document.querySelectorAll('.control-btn');
        
        buttons.forEach(btn => btn.classList.remove('active'));
        buttons[frameNum].classList.add('active');
        
        if (frameNum === 1) {
            frame1.classList.remove('hidden');
            frame1.classList.add('full');
            frame2.classList.add('hidden');
            frame2.classList.remove('full');
            currentView = 'frame1';
        } else {
            frame2.classList.remove('hidden');
            frame2.classList.add('full');
            frame1.classList.add('hidden');
            frame1.classList.remove('full');
            currentView = 'frame2';
        }
    }

    function reloadFrames() {
        const frame1 = document.getElementById('frame1');
        const frame2 = document.getElementById('frame2');
        
        frame1.src = frame1.src;
        frame2.src = frame2.src;
    }

    // Tự động ẩn menu khi click ra ngoài
    document.addEventListener('click', function(event) {
        const menu = document.getElementById('menu');
        const menuButton = document.querySelector('.menu-button');
        
        if (!menu.contains(event.target) && !menuButton.contains(event.target)) {
            menu.classList.remove('show');
        }
    });

    // Ngăn menu đóng khi click vào bên trong
    document.getElementById('menu').addEventListener('click', function(event) {
        event.stopPropagation();
    });

    // Load frame khi nhấn Enter
    document.getElementById('url1').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            loadFrame(1);
        }
    });

    document.getElementById('url2').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            loadFrame(2);
        }
    });

    // Xử lý viewport cho iOS
    function setVH() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }

    window.addEventListener('resize', setVH);
    window.addEventListener('orientationchange', setVH);
    setVH();
</script>
