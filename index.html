<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Split Web Viewer — 1 file</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b0f14" />

<style>
  :root{
    --bg:#0b0f14;
    --fg:#e9eef4;
    --muted:#aab3bd;
    --accent:#3ea6ff;
    --panel:#121922cc;
    --glass:#0b0f14cc;
    --btn:#1b2733;
    --btn-hover:#233343;
    --radius:12px;
    --gap:10px;
    --split:50; /* phần trăm khung 1 */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
  }

  *{box-sizing:border-box}
  html,body{
    margin:0; height:100%; background:var(--bg); color:var(--fg);
    overscroll-behavior:none; -webkit-touch-callout:none;
  }
  body{
    height:100dvh; /* iOS Safari modern */
    font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  }

  /* Khung chia */
  .stage{
    position:fixed; inset:0;
    padding-top:calc(var(--safe-top));
    padding-right:calc(var(--safe-right));
    padding-bottom:calc(var(--safe-bottom));
    padding-left:calc(var(--safe-left));
    display:grid;
    gap:var(--gap);
    background:linear-gradient(180deg,#0b0f14,#0b0f14 60%, #0b0f14);
  }
  /* Portrait: trên / dưới */
  .stage.is-portrait{
    grid-template-rows: minmax(0, calc(var(--split)*1%)) minmax(0, calc((100 - var(--split))*1%));
    grid-template-columns: 1fr;
  }
  /* Landscape: trái / phải */
  .stage.is-landscape{
    grid-template-columns: minmax(0, calc(var(--split)*1%)) minmax(0, calc((100 - var(--split))*1%));
    grid-template-rows: 1fr;
  }

  iframe.viewer{
    width:100%; height:100%; border:0; border-radius:var(--radius);
    background:#0f1620;
    box-shadow:0 0 0 1px #1a2735 inset;
  }
  /* Hạn chế mở tab mới: không cấp allow-popups */
  iframe.viewer[sandbox]{}

  /* Nút chia (thay thanh kéo) */
  .split-btn{
    position:fixed;
    z-index:20;
    display:flex; align-items:center; justify-content:center;
    width:42px; height:42px;
    border-radius:999px; border:1px solid #2a3949;
    background:var(--btn);
    box-shadow:0 10px 25px #0008, 0 0 0 1px #0005 inset;
    cursor:pointer; user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
  }
  .split-btn:hover{ background:var(--btn-hover) }
  .split-btn .dot{
    width:6px; height:6px; border-radius:999px; margin:2px; background:var(--fg); opacity:.9;
  }

  /* Vị trí nút chia theo xoay */
  .stage.is-portrait + .split-btn{
    left:50%; transform:translate(-50%, 0);
    top:calc( max(6px, var(--safe-top)) + 6px );
  }
  .stage.is-landscape + .split-btn{
    top:50%; transform:translate(0, -50%);
    left:calc( max(6px, var(--safe-left)) + 6px );
  }

  /* Menu nổi */
  .fab{
    position:fixed; right:calc(12px + var(--safe-right)); bottom:calc(12px + var(--safe-bottom));
    z-index:30;
  }
  .fab > button{
    padding:10px 14px; border-radius:999px; border:1px solid #2a3949;
    background:var(--accent); color:#001525; font-weight:700;
    cursor:pointer; box-shadow:0 10px 25px #0008;
  }

  .panel-wrap{
    position:fixed; inset:0; z-index:25; display:none;
    backdrop-filter: blur(6px);
    background: radial-gradient(1200px 800px at 80% 120%, #1b273388 0%, transparent 60%);
  }
  .panel-wrap.show{ display:block; }
  .panel{
    position:fixed; right:calc(12px + var(--safe-right)); bottom:calc(64px + var(--safe-bottom));
    width:min(92vw, 420px);
    background:var(--panel); color:var(--fg);
    border:1px solid #2a3949; border-radius:16px;
    padding:12px; box-shadow:0 10px 30px #000a;
  }
  .panel h3{ margin:6px 6px 10px; font-size:14px; color:var(--muted); font-weight:600; }
  .row{ display:flex; gap:8px; margin:8px 0; }
  .row .grow{ flex:1; }
  input[type="url"]{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid #2a3949;
    background:#0c131b; color:var(--fg);
  }
  .btn{
    padding:10px 12px; border-radius:10px; border:1px solid #2a3949;
    background:var(--btn); color:var(--fg); cursor:pointer;
  }
  .btn:hover{ background:var(--btn-hover); }
  .btn.accent{ background:var(--accent); color:#001525; font-weight:700; border-color:transparent; }
  .hint{ color:var(--muted); font-size:12px; margin:6px; }

  /* Trạng thái Full Frame */
  .full-1 .f2{ display:none !important; }
  .full-1.stage.is-portrait{ grid-template-rows: 1fr 0 }
  .full-1.stage.is-landscape{ grid-template-columns: 1fr 0 }

  .full-2 .f1{ display:none !important; }
  .full-2.stage.is-portrait{ grid-template-rows: 0 1fr }
  .full-2.stage.is-landscape{ grid-template-columns: 0 1fr }

  /* Cuộn trong panel mượt hơn trên iOS */
  .panel{ -webkit-overflow-scrolling:touch; max-height: 70dvh; overflow:auto; }
</style>
</head>
<body>

  <!-- Khung chia -->
  <div id="stage" class="stage">
    <iframe id="frame1" class="viewer f1" title="Frame 1" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
    <iframe id="frame2" class="viewer f2" title="Frame 2" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
  </div>

  <!-- Nút chia (đặt sau .stage để dùng selector anh em + định vị) -->
  <button id="splitBtn" class="split-btn" aria-label="Điều chỉnh tỉ lệ">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </button>

  <!-- FAB mở menu -->
  <div class="fab">
    <button id="openMenu" aria-haspopup="dialog">Menu</button>
  </div>

  <!-- Panel menu -->
  <div id="panelWrap" class="panel-wrap" aria-hidden="true">
    <div class="panel" role="dialog" aria-modal="true" aria-label="Bảng điều khiển">
      <h3>Liên kết & điều khiển</h3>

      <div class="row">
        <input id="url1" class="grow" type="url" placeholder="Link cho Frame 1 (https://…)" />
        <button class="btn" id="load1">Tải</button>
        <button class="btn" id="clear1" title="Xoá link 1">Xoá</button>
      </div>
      <div class="row">
        <input id="url2" class="grow" type="url" placeholder="Link cho Frame 2 (https://…)" />
        <button class="btn" id="load2">Tải</button>
        <button class="btn" id="clear2" title="Xoá link 2">Xoá</button>
      </div>

      <div class="row">
        <button class="btn" id="full1">Full Frame 1</button>
        <button class="btn" id="full2">Full Frame 2</button>
        <button class="btn" id="split50">Chia đôi</button>
      </div>

      <div class="row">
        <button class="btn accent" id="closeMenu">Đóng</button>
      </div>

      <div class="hint">Gợi ý: Nhập link rồi bấm <b>Tải</b>. Nút <b>Chia đôi</b> đưa về 50/50. Nút chia ở giữa để đảo tỉ lệ 30/70 ↔ 70/30.</div>
      <div class="hint">Ghi chú: Iframe ở chế độ sandbox để <b>không bật tab mới</b> khi trang cố mở pop-up.</div>
    </div>
  </div>

<script>
(() => {
  const $ = s => document.querySelector(s);
  const stage = $('#stage');
  const f1 = $('#frame1'), f2 = $('#frame2');
  const splitBtn = $('#splitBtn');

  const panelWrap = $('#panelWrap');
  const openMenu = $('#openMenu');
  const closeMenu = $('#closeMenu');

  const url1 = $('#url1'), url2 = $('#url2');
  const load1 = $('#load1'), load2 = $('#load2');
  const clear1 = $('#clear1'), clear2 = $('#clear2');

  const full1 = $('#full1'), full2 = $('#full2'), split50 = $('#split50');

  /* ----------------- Hỗ trợ xoay & tai thỏ iOS ----------------- */
  const setOrientationClass = () => {
    const portrait = window.matchMedia("(orientation: portrait)").matches;
    stage.classList.toggle('is-portrait', portrait);
    stage.classList.toggle('is-landscape', !portrait);
  };
  setOrientationClass();
  window.addEventListener('orientationchange', setOrientationClass);
  window.addEventListener('resize', setOrientationClass);

  /* ----------------- Helper split ----------------- */
  const getSplit = () => parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--split')) || 50;
  const setSplit = (pct) => {
    const clamped = Math.min(100, Math.max(0, pct));
    document.documentElement.style.setProperty('--split', clamped);
  };

  /* Nút chia: đảo 30/70 ↔ 70/30 (giữ nhanh gọn theo yêu cầu “nút”) */
  const toggleSplit = () => {
    const s = getSplit();
    if (Math.abs(s - 50) < 1) {
      setSplit(70); // nếu đang 50/50, chuyển 70/30
    } else if (s > 50) {
      setSplit(30); // 70 → 30
    } else {
      setSplit(70); // 30 → 70
    }
    // Bỏ trạng thái full nếu đang bật
    document.body.classList.remove('full-1','full-2');
  };

  splitBtn.addEventListener('click', toggleSplit);

  /* ----------------- Menu nổi ----------------- */
  const openPanel = () => {
    panelWrap.classList.add('show');
    panelWrap.setAttribute('aria-hidden','false');
  };
  const closePanel = () => {
    panelWrap.classList.remove('show');
    panelWrap.setAttribute('aria-hidden','true');
  };
  openMenu.addEventListener('click', openPanel);
  closeMenu.addEventListener('click', closePanel);
  panelWrap.addEventListener('click', (e)=>{
    if(e.target === panelWrap) closePanel();
  });

  /* ----------------- Điều khiển link ----------------- */
  const normalizeUrl = (v) => {
    v = (v || '').trim();
    if(!v) return '';
    if(/^https?:\/\//i.test(v)) return v;
    return 'https://' + v;
  };

  load1.addEventListener('click', ()=>{
    const u = normalizeUrl(url1.value);
    if(u){ f1.src = u; }
  });
  load2.addEventListener('click', ()=>{
    const u = normalizeUrl(url2.value);
    if(u){ f2.src = u; }
  });

  clear1.addEventListener('click', ()=>{
    url1.value = '';
    f1.removeAttribute('src');
  });
  clear2.addEventListener('click', ()=>{
    url2.value = '';
    f2.removeAttribute('src');
  });

  /* ----------------- Full / Split ----------------- */
  full1.addEventListener('click', ()=>{
    document.body.classList.add('full-1');
    document.body.classList.remove('full-2');
  });
  full2.addEventListener('click', ()=>{
    document.body.classList.add('full-2');
    document.body.classList.remove('full-1');
  });
  split50.addEventListener('click', ()=>{
    document.body.classList.remove('full-1','full-2');
    setSplit(50);
  });

  /* Khởi tạo tỉ lệ mặc định */
  setSplit(50);

  /* ----------------- Chặn kéo-zoom làm lệch layout trên iOS ----------------- */
  document.addEventListener('gesturestart', (e)=> e.preventDefault());
  // Ngăn double-tap zoom:
  let lastTouch = 0;
  document.addEventListener('touchend', (e)=>{
    const now = Date.now();
    if(now - lastTouch <= 300){ e.preventDefault(); }
    lastTouch = now;
  }, {passive:false});

  /* Gợi ý trang mẫu để test nhanh (không bắt buộc) */
  url1.placeholder = "vd: https://news.ycombinator.com";
  url2.placeholder = "vd: https://developer.mozilla.org";
})();
</script>
</body>
</html>
