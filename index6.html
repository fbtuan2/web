<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        }

        .main-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
            box-sizing: border-box;
        }

        .frames-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .frames-wrapper.layout-vertical {
            flex-direction: column;
        }

        .frames-wrapper.layout-horizontal {
            flex-direction: row;
        }

        .frame {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            min-height: 0;
            min-width: 0;
        }

        .frame.frame-hidden {
            flex: 0;
            width: 0;
            height: 0;
            min-height: 0;
            min-width: 0;
            opacity: 0;
            visibility: hidden;
        }

        .menu-toggle {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 8px);
            right: calc(env(safe-area-inset-right) + 8px);
            z-index: 10000;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            user-select: none;
        }

        .menu-toggle:hover {
            background: rgba(0, 0, 0, 0.6);
            transform: scale(1.05);
        }

        .menu-toggle:active {
            transform: scale(0.95);
        }

        .menu-panel {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 45px);
            right: calc(env(safe-area-inset-right) + 8px);
            z-index: 9999;
            width: 180px;
            max-width: calc(20vw);
            min-width: 160px;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .menu-panel.menu-visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .menu-group {
            margin-bottom: 6px;
        }

        .menu-group:last-child {
            margin-bottom: 0;
        }

        .menu-title {
            font-size: 8px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .layout-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-bottom: 2px;
        }

        .layout-btn {
            padding: 4px 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            font-size: 7px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .layout-btn:hover {
            border-color: rgba(0, 122, 255, 0.5);
            background: rgba(0, 122, 255, 0.15);
        }

        .layout-btn.layout-active {
            border-color: rgba(0, 122, 255, 0.7);
            background: rgba(0, 122, 255, 0.5);
            color: #fff;
        }

        .url-input-group {
            display: flex;
            gap: 2px;
            align-items: center;
            margin-bottom: 3px;
        }

        .url-input {
            flex: 1;
            padding: 4px 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 8px;
            outline: none;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
        }

        .url-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 7px;
        }

        .url-input:focus {
            border-color: rgba(0, 122, 255, 0.6);
            background: rgba(255, 255, 255, 0.08);
        }

        .load-btn {
            padding: 4px 7px;
            background: rgba(0, 122, 255, 0.6);
            color: #fff;
            border: 1px solid rgba(0, 122, 255, 0.4);
            border-radius: 4px;
            font-size: 7px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .load-btn:hover {
            background: rgba(0, 122, 255, 0.7);
        }

        .view-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .view-btn {
            padding: 10px 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .view-btn:hover {
            border-color: rgba(0, 122, 255, 0.8);
            background: rgba(0, 122, 255, 0.3);
        }

        .view-btn.view-active {
            border-color: rgba(0, 122, 255, 1);
            background: rgba(0, 122, 255, 0.7);
            color: #fff;
        }

        .utility-btn {
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .utility-btn:hover {
            border-color: rgba(52, 199, 89, 0.8);
            background: rgba(52, 199, 89, 0.3);
        }

        .utility-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* Responsive cho mobile */
        @media (max-width: 768px) {
            .menu-panel {
                left: calc(env(safe-area-inset-left) + 8px);
                right: calc(env(safe-area-inset-right) + 8px);
                width: auto;
                max-width: none;
                padding: 10px;
            }

            .menu-toggle {
                top: calc(env(safe-area-inset-top) + 6px);
                right: calc(env(safe-area-inset-right) + 6px);
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            .view-controls {
                grid-template-columns: 1fr;
                gap: 3px;
            }

            .layout-controls {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .menu-group {
                margin-bottom: 8px;
            }

            .url-input {
                font-size: 9px;
                padding: 5px 6px;
            }

            .load-btn {
                padding: 5px 8px;
                font-size: 8px;
            }

            .menu-title {
                font-size: 8px;
                margin-bottom: 4px;
            }
        }

        /* Auto scale on zoom */
        @media (max-width: 480px) {
            .menu-panel {
                padding: 8px;
                border-radius: 8px;
            }

            .menu-toggle {
                width: 26px;
                height: 26px;
                font-size: 11px;
            }

            .menu-title {
                font-size: 7px;
                margin-bottom: 3px;
            }

            .url-input, .layout-btn, .view-btn, .utility-btn, .load-btn {
                font-size: 7px;
                padding: 4px 6px;
            }

            .view-btn {
                padding: 4px 3px;
            }
        }

        /* iOS Safari optimizations */
        @supports (-webkit-touch-callout: none) {
            html, body {
                height: -webkit-fill-available;
            }
            
            .main-container {
                height: -webkit-fill-available;
            }
        }

        /* Đảm bảo frames full tràn */
        iframe {
            display: block;
            border: 0;
            margin: 0;
            padding: 0;
        }

        /* Ẩn scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Menu Toggle Button -->
        <button class="menu-toggle" onclick="toggleMenu()">⋯</button>
        
        <!-- Menu Panel -->
        <div class="menu-panel" id="menuPanel">
            <!-- Layout Controls -->
            <div class="menu-group">
                <div class="menu-title">Bố cục</div>
                <div class="layout-controls">
                    <button class="layout-btn layout-active" onclick="setLayout('vertical')">Dọc ⬍</button>
                    <button class="layout-btn" onclick="setLayout('horizontal')">Ngang ⬌</button>
                </div>
            </div>

            <!-- Frame 1 Controls -->
            <div class="menu-group">
                <div class="menu-title">Frame 1</div>
                <div class="url-input-group">
                    <input type="url" class="url-input" id="urlInput1" placeholder="Nhập URL cho Frame 1..." value="https://www.google.com">
                    <button class="load-btn" onclick="loadFrame(1)">Tải</button>
                </div>
            </div>

            <!-- Frame 2 Controls -->
            <div class="menu-group">
                <div class="menu-title">Frame 2</div>
                <div class="url-input-group">
                    <input type="url" class="url-input" id="urlInput2" placeholder="Nhập URL cho Frame 2..." value="https://www.youtube.com">
                    <button class="load-btn" onclick="loadFrame(2)">Tải</button>
                </div>
            </div>

            <!-- View Controls -->
            <div class="menu-group">
                <div class="menu-title">Hiển thị</div>
                <div class="view-controls">
                    <button class="view-btn view-active" onclick="setView('both')">Cả hai</button>
                    <button class="view-btn" onclick="setView('frame1')">Frame 1</button>
                    <button class="view-btn" onclick="setView('frame2')">Frame 2</button>
                </div>
            </div>

            <!-- Utility Controls -->
            <div class="menu-group">
                <div class="menu-title">Tiện ích</div>
                <div class="utility-controls">
                    <button class="utility-btn" onclick="refreshFrames()">🔄 Làm mới</button>
                    <button class="utility-btn" onclick="clearFrames()">🗑️ Xóa hết</button>
                </div>
            </div>
        </div>

        <!-- Frames Wrapper -->
        <div class="frames-wrapper layout-vertical" id="framesWrapper">
            <iframe class="frame" id="frame1" src="https://www.google.com" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation"></iframe>
            <iframe class="frame" id="frame2" src="https://www.youtube.com" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation"></iframe>
        </div>
    </div>

    <script>
        let isMenuOpen = false;
        let currentLayout = 'vertical';
        let currentView = 'both';

        // Toggle Menu
        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            const menuPanel = document.getElementById('menuPanel');
            
            if (isMenuOpen) {
                menuPanel.classList.add('menu-visible');
            } else {
                menuPanel.classList.remove('menu-visible');
            }
        }

        // Set Layout
        function setLayout(layout) {
            currentLayout = layout;
            const wrapper = document.getElementById('framesWrapper');
            const buttons = document.querySelectorAll('.layout-btn');
            
            wrapper.className = `frames-wrapper layout-${layout}`;
            
            buttons.forEach(btn => btn.classList.remove('layout-active'));
            event.target.classList.add('layout-active');
        }

        // Load Frame
        function loadFrame(frameNumber) {
            const urlInput = document.getElementById(`urlInput${frameNumber}`);
            const frame = document.getElementById(`frame${frameNumber}`);
            let url = urlInput.value.trim();
            
            if (!url) return;
            
            // Auto-add https if no protocol
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            frame.src = url;
        }

        // Set View
        function setView(view) {
            currentView = view;
            const frame1 = document.getElementById('frame1');
            const frame2 = document.getElementById('frame2');
            const buttons = document.querySelectorAll('.view-btn');
            
            // Remove all active classes
            buttons.forEach(btn => btn.classList.remove('view-active'));
            
            // Reset frames
            frame1.classList.remove('frame-hidden');
            frame2.classList.remove('frame-hidden');
            
            if (view === 'frame1') {
                frame2.classList.add('frame-hidden');
                buttons[1].classList.add('view-active');
            } else if (view === 'frame2') {
                frame1.classList.add('frame-hidden');
                buttons[2].classList.add('view-active');
            } else {
                buttons[0].classList.add('view-active');
            }
        }

        // Refresh Frames
        function refreshFrames() {
            const frame1 = document.getElementById('frame1');
            const frame2 = document.getElementById('frame2');
            
            frame1.src = frame1.src;
            frame2.src = frame2.src;
        }

        // Clear Frames
        function clearFrames() {
            document.getElementById('frame1').src = 'about:blank';
            document.getElementById('frame2').src = 'about:blank';
            document.getElementById('urlInput1').value = '';
            document.getElementById('urlInput2').value = '';
        }

        // Auto-hide menu when clicking outside
        document.addEventListener('click', function(event) {
            const menuPanel = document.getElementById('menuPanel');
            const menuToggle = document.querySelector('.menu-toggle');
            
            if (!menuPanel.contains(event.target) && !menuToggle.contains(event.target)) {
                if (isMenuOpen) {
                    toggleMenu();
                }
            }
        });

        // Prevent menu from closing when clicking inside
        document.getElementById('menuPanel').addEventListener('click', function(event) {
            event.stopPropagation();
        });

        // Enter key support for URL inputs
        document.getElementById('urlInput1').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadFrame(1);
            }
        });

        document.getElementById('urlInput2').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadFrame(2);
            }
        });

        // Handle viewport changes for mobile
        function handleViewportChange() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }

        window.addEventListener('resize', handleViewportChange);
        window.addEventListener('orientationchange', handleViewportChange);
        handleViewportChange();

        // Prevent zoom on input focus (iOS)
        document.addEventListener('touchstart', function() {}, true);
    </script>
</body>
</html>
